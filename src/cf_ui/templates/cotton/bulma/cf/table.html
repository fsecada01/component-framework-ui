<c-props hx_target="" hx_url="" class="" />
{% load cf_ui %}
<div class="{{ class }}">
  <table class="table is-striped is-hoverable is-fullwidth">
    <thead>
      <tr>
        {% for col in columns %}
        <th>{{ col.label }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        {% for col in columns %}
        <td>{{ row|get_item:col.key }}</td>
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
